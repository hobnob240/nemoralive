<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | NEMORA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
      color: #111;
    }

    .container {
      max-width: 600px;
      margin: 80px auto;
      padding: 40px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p.subtitle {
      margin-bottom: 30px;
      color: #666;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #000;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #000;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #333;
    }

    #formStatus {
      margin-top: 16px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Let’s Build Something Powerful</h1>
    <p class="subtitle">Tell us about your project and we’ll be in touch shortly.</p>

    <form id="contactForm" action="https://formspree.io/f/xojnzjze" method="POST">

      <input type="hidden" name="_subject" value="New Enquiry - NEMORA Website">
      <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="form-group">
        <label for="company">Company Name</label>
        <input id="company" name="company" type="text">
      </div>

      <div class="form-group">
        <label for="message">Project Details</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <button type="submit">Send Enquiry</button>

      <p id="formStatus"></p>
    </form>
  </div>

  <footer>
    © 2026 NEMORA. All rights reserved.
  </footer>

  <script>
    const form = document.getElementById("contactForm");
    const status = document.getElementById("formStatus");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      status.textContent = "Sending...";

      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.reset();
          status.textContent = "✅ Message sent successfully. We’ll be in touch shortly.";
        } else {
          status.textContent = "❌ Something went wrong. Please try again.";
        }
      } catch (error) {
        status.textContent = "❌ Network error. Please try again.";
      }
    });
  </script>

</body>
</html>
